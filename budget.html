<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Budget"/>
  <title>Mon Budget</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f3;
      --surface: #ffffff;
      --surface2: #f0efed;
      --border: rgba(0,0,0,0.1);
      --text: #1a1a1a;
      --text2: #666660;
      --text3: #999994;
      --green: #1D9E75;
      --green-bg: #E1F5EE;
      --green-text: #085041;
      --amber: #BA7517;
      --amber-bg: #FAEEDA;
      --amber-text: #633806;
      --red: #D85A30;
      --red-bg: #FAECE7;
      --red-text: #4A1B0C;
      --radius: 14px;
      --radius-sm: 10px;
    }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    .app { max-width: 480px; margin: 0 auto; padding: 0 0 48px; }
    .header {
      background: var(--surface);
      padding: 16px 20px 14px;
      border-bottom: 0.5px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .header-title { font-size: 17px; font-weight: 600; }
    .header-date { font-size: 12px; color: var(--text3); }
    .month-nav { display: flex; align-items: center; }
    .nav-btn {
      width: 44px; height: 44px;
      background: var(--surface2); border: 0.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 20px; color: var(--text);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .nav-btn:active { background: #e0dfd9; }
    .month-name { flex: 1; text-align: center; font-size: 15px; font-weight: 600; padding: 0 12px; }
    .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 14px 16px; }
    .sum-card { background: var(--surface); border-radius: var(--radius-sm); padding: 10px 10px 8px; text-align: center; }
    .sum-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; line-height: 1.3; }
    .sum-value { font-size: 17px; font-weight: 700; }
    .col-green { color: var(--green); }
    .col-amber { color: var(--amber); }
    .col-red   { color: var(--red);   }
    .cats { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
    .cat-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 16px;
      border: 0.5px solid var(--border);
    }
    .cat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .cat-name { font-size: 15px; font-weight: 600; }
    .badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; }
    .badge-ok   { background: var(--green-bg); color: var(--green-text); }
    .badge-warn { background: var(--amber-bg); color: var(--amber-text); }
    .badge-over { background: var(--red-bg);   color: var(--red-text);   }
    .cat-amounts { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
    .cat-amounts b { color: var(--text); font-weight: 600; }
    .gauge-wrap { position: relative; margin-bottom: 22px; }
    .gauge-track { height: 10px; background: var(--surface2); border-radius: 999px; overflow: visible; position: relative; }
    .gauge-fill { height: 100%; border-radius: 999px; position: relative; z-index: 1; }
    .milestone { position: absolute; top: -4px; width: 2px; height: 18px; background: #ccc; z-index: 2; }
    .milestone-label { position: absolute; top: 20px; font-size: 10px; color: var(--text3); transform: translateX(-50%); white-space: nowrap; }
    .target-line { position: absolute; top: -5px; width: 3px; height: 20px; background: var(--green); border-radius: 2px; z-index: 3; }
    .input-row {
      display: flex; gap: 8px; align-items: stretch;
      margin-top: 10px; border-top: 0.5px solid var(--border); padding-top: 10px;
    }
    .input-row select,
    .input-row input[type=number] {
      height: 46px;
      border: 0.5px solid var(--border); border-radius: var(--radius-sm);
      background: var(--surface2); color: var(--text);
      font-size: 15px; padding: 0 10px;
      -webkit-appearance: none; appearance: none;
    }
    .input-row select { width: 100px; flex-shrink: 0; text-align: center; }
    .input-row input[type=number] {
      flex: 1; min-width: 0;
      -moz-appearance: textfield;
    }
    .input-row input[type=number]::-webkit-inner-spin-button,
    .input-row input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .add-btn {
      height: 46px; min-width: 80px;
      background: var(--text); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600;
      cursor: pointer; flex-shrink: 0;
    }
    .add-btn:active { opacity: 0.8; }
    .footer { padding: 20px 16px 0; display: flex; flex-direction: column; gap: 10px; }
    .edit-btn, .reset-btn {
      width: 100%; height: 48px; border-radius: var(--radius);
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .edit-btn  { background: var(--surface); border: 0.5px solid var(--border); color: var(--text2); }
    .reset-btn { background: var(--surface); border: 0.5px solid var(--border); color: var(--red); }
    .edit-btn:active  { background: var(--surface2); }
    .reset-btn:active { background: var(--red-bg); }
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 100; display: flex; align-items: flex-end; justify-content: center;
    }
    .modal {
      background: var(--surface); border-radius: var(--radius) var(--radius) 0 0;
      padding: 20px 20px 40px; width: 100%; max-width: 480px;
      max-height: 88vh; overflow-y: auto;
    }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
    .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 14px; }
    .modal-ref {
      background: var(--surface2); border-radius: var(--radius-sm);
      padding: 10px 14px; margin-bottom: 6px; font-size: 13px; color: var(--text2);
    }
    .modal-ref b { color: var(--text); }
    .modal-sum {
      border-radius: var(--radius-sm);
      padding: 10px 14px; margin-bottom: 14px; font-size: 13px;
    }
    .modal-sum-ok   { background: var(--green-bg); color: var(--green-text); }
    .modal-sum-warn { background: var(--amber-bg); color: var(--amber-text); }
    .modal-cat-title { font-size: 14px; font-weight: 600; margin: 14px 0 8px; }
    .modal-sep { height: 0.5px; background: var(--border); margin: 14px 0; }
    .modal-field { margin-bottom: 10px; }
    .modal-field label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; }
    .modal-field input {
      width: 100%; height: 44px;
      border: 0.5px solid var(--border); border-radius: var(--radius-sm);
      background: var(--surface2); color: var(--text);
      font-size: 15px; padding: 0 12px;
    }
    .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
    .modal-actions button {
      flex: 1; height: 48px; border-radius: var(--radius-sm);
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .btn-cancel { background: var(--surface2); border: 0.5px solid var(--border); color: var(--text2); }
    .btn-save   { background: var(--text); border: none; color: #fff; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <span class="header-title">Mon budget</span>
      <span class="header-date" id="today-label"></span>
    </div>
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
      <span class="month-name" id="month-name"></span>
      <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
    </div>
  </div>

  <div class="summary">
    <div class="sum-card">
      <div class="sum-label">Budget du mois</div>
      <div class="sum-value" id="sum-budget">—</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Dépensé</div>
      <div class="sum-value col-amber" id="sum-spent">—</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Reste</div>
      <div class="sum-value" id="sum-remaining">—</div>
    </div>
  </div>

  <div class="cats" id="cats-container"></div>

  <div class="footer">
    <button class="edit-btn"  onclick="openModal()">Modifier les budgets</button>
    <button class="reset-btn" onclick="resetMonth()">Remettre à zéro ce mois</button>
  </div>
</div>
<div id="modal-container"></div>

<script>
var MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
var DAYS   = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
var BUDGET_REF = 1272;
try { var _ref = parseInt(localStorage.getItem('bgt_ref'), 10); if (!isNaN(_ref) && _ref > 0) BUDGET_REF = _ref; } catch(e) {}

var DEFAULT_CATS = [
  { id:'courses',   name:'Courses',             monthly:480, target:430, milestones:true  },
  { id:'essence',   name:'Essence',              monthly:300, target:280, milestones:true  },
  { id:'sorties',   name:'Loisirs / sorties',    monthly:150, target:120, milestones:true  },
  { id:'vacances',  name:'Week-ends / vacances', monthly:150, target:100, milestones:false },
  { id:'vetements', name:'Vêtements / beauté',   monthly:100, target:80,  milestones:false },
  { id:'autres',    name:'Autres',               monthly:92,  target:92,  milestones:false }
];

var now = new Date();
var viewYear  = now.getFullYear();
var viewMonth = now.getMonth();

function sKey(y, m) { return 'bgt_' + y + '_' + (m + 1); }

function loadState(y, m) {
  try {
    var r = localStorage.getItem(sKey(y, m));
    if (r) return JSON.parse(r);
  } catch(e) {}
  return { cats: JSON.parse(JSON.stringify(DEFAULT_CATS)), spending: {}, credits: 0 };
}

function saveState(s) {
  try { localStorage.setItem(sKey(viewYear, viewMonth), JSON.stringify(s)); } catch(e) {}
}

function getState() { return loadState(viewYear, viewMonth); }

function r(n) { return Math.round(n); }

function getColor(pct) {
  if (pct <= 0.75) return '#1D9E75';
  if (pct <= 0.95) return '#BA7517';
  return '#D85A30';
}

function getBadge(pct) {
  if (pct <= 0.75) return ['Dans le budget', 'badge-ok'];
  if (pct <= 1.0)  return ['Attention',       'badge-warn'];
  return ['Dépassement', 'badge-over'];
}

function addEntry(catId) {
  var s   = getState();
  var inp = document.getElementById('inp-' + catId);
  var v   = parseInt(inp.value, 10);
  if (isNaN(v) || v <= 0) { inp.value = ''; return; }
  if (catId === 'autres') {
    var sel = document.getElementById('sel-autres');
    if (sel && sel.value === 'rentree') {
      s.credits = (s.credits || 0) + v;
    } else {
      s.spending['autres'] = (s.spending['autres'] || 0) + v;
    }
  } else {
    s.spending[catId] = (s.spending[catId] || 0) + v;
  }
  inp.value = '';
  saveState(s);
  render();
}

function changeMonth(d) {
  viewMonth += d;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
  render();
}

function resetMonth() {
  if (!confirm('Remettre à zéro ' + MONTHS[viewMonth] + ' ' + viewYear + ' ?')) return;
  var s = getState();
  s.spending = {};
  s.credits  = 0;
  saveState(s);
  render();
}

function updateBudgetRef() {
  var el = document.getElementById('ref-input');
  if (el) {
    var v = parseInt(el.value, 10);
    if (!isNaN(v) && v > 0) BUDGET_REF = v;
  }
  updateModalSum();
}

function calcModalSum() {
  var sum = 0;
  var cats = getState().cats;
  for (var i = 0; i < cats.length; i++) {
    var el = document.getElementById('bm-' + cats[i].id);
    if (el) { var v = parseInt(el.value, 10); if (!isNaN(v)) sum += v; }
  }
  return sum;
}

function updateModalSum() {
  var sum  = calcModalSum();
  var diff = sum - BUDGET_REF;
  var el   = document.getElementById('modal-sum-line');
  if (!el) return;
  if (diff > 0) {
    el.className = 'modal-sum modal-sum-warn';
    el.textContent = 'Total catégories : ' + sum + ' € — dépasse le budget de référence de ' + diff + ' €';
  } else if (diff < 0) {
    el.className = 'modal-sum modal-sum-ok';
    el.textContent = 'Total catégories : ' + sum + ' € — il reste ' + Math.abs(diff) + ' € non affectés';
  } else {
    el.className = 'modal-sum modal-sum-ok';
    el.textContent = 'Total catégories : ' + sum + ' € — parfait, budget équilibré !';
  }
}

function openModal() {
  var s    = getState();
  var cats = s.cats;
  var fields = '';
  for (var i = 0; i < cats.length; i++) {
    var cat = cats[i];
    if (i > 0) fields += '<div class="modal-sep"></div>';
    fields += '<div class="modal-cat-title">' + cat.name + '</div>';
    fields += '<div class="modal-field"><label>Budget mensuel (€)</label><input type="number" inputmode="numeric" id="bm-' + cat.id + '" value="' + cat.monthly + '" oninput="updateModalSum()"/></div>';
    fields += '<div class="modal-field"><label>Cible (€)</label><input type="number" inputmode="numeric" id="bt-' + cat.id + '" value="' + cat.target + '"/></div>';
  }

  var initSum  = 0;
  cats.forEach(function(c) { initSum += c.monthly; });
  var initDiff = initSum - BUDGET_REF;
  var initCls  = initDiff > 0 ? 'modal-sum modal-sum-warn' : 'modal-sum modal-sum-ok';
  var initTxt  = initDiff > 0
    ? 'Total catégories : ' + initSum + ' € — dépasse le budget de référence de ' + initDiff + ' €'
    : (initDiff < 0
      ? 'Total catégories : ' + initSum + ' € — il reste ' + Math.abs(initDiff) + ' € non affectés'
      : 'Total catégories : ' + initSum + ' € — parfait, budget équilibré !');

  document.getElementById('modal-container').innerHTML =
    '<div class="modal-bg" id="mbg">' +
    '<div class="modal">' +
    '<div class="modal-handle"></div>' +
    '<h3>Modifier les budgets</h3>' +
    '<div class="modal-field" style="margin-bottom:6px;"><label style="font-size:13px;font-weight:600;color:var(--text);">Budget variable total du mois (€)</label><input type="number" inputmode="numeric" id="ref-input" value="' + BUDGET_REF + '" oninput="updateBudgetRef()" style="width:100%;height:44px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-size:15px;padding:0 12px;"/></div>' +
    '<div id="modal-sum-line" class="' + initCls + '">' + initTxt + '</div>' +
    fields +
    '<div class="modal-actions">' +
    '<button class="btn-cancel" onclick="closeModal()">Annuler</button>' +
    '<button class="btn-save" onclick="saveModal()">Enregistrer</button>' +
    '</div></div></div>';

  document.getElementById('mbg').addEventListener('click', function(e) {
    if (e.target.id === 'mbg') closeModal();
  });
}

function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

function saveModal() {
  var refEl = document.getElementById('ref-input');
  if (refEl) {
    var rv = parseInt(refEl.value, 10);
    if (!isNaN(rv) && rv > 0) {
      BUDGET_REF = rv;
      try { localStorage.setItem('bgt_ref', rv); } catch(e) {}
    }
  }
  var s    = getState();
  var cats = s.cats;
  for (var i = 0; i < cats.length; i++) {
    var cat = cats[i];
    var m = document.getElementById('bm-' + cat.id);
    var t = document.getElementById('bt-' + cat.id);
    if (m) { var v = parseInt(m.value, 10); if (!isNaN(v) && v >= 0) cat.monthly = v; }
    if (t) { var v = parseInt(t.value, 10); if (!isNaN(v) && v >= 0) cat.target  = v; }
  }
  saveState(s);
  closeModal();
  render();
}

function render() {
  var s       = getState();
  var cats    = s.cats;
  var credits = s.credits || 0;

  document.getElementById('today-label').textContent =
    DAYS[now.getDay()] + ' ' + now.getDate() + ' ' + MONTHS[now.getMonth()].toLowerCase();
  document.getElementById('month-name').textContent =
    MONTHS[viewMonth] + ' ' + viewYear;

  var totalBudget = 0;
  var totalSpent  = 0;
  for (var i = 0; i < cats.length; i++) {
    totalBudget += cats[i].monthly;
    totalSpent  += (s.spending[cats[i].id] || 0);
  }
  var net = totalSpent - credits;
  var rem = totalBudget - net;

  document.getElementById('sum-budget').textContent = r(totalBudget) + ' €';
  document.getElementById('sum-spent').textContent  = r(net) + ' €';
  var remEl = document.getElementById('sum-remaining');
  remEl.textContent = (rem >= 0 ? '' : '−') + r(Math.abs(rem)) + ' €';
  remEl.className   = 'sum-value ' + (rem >= 0 ? 'col-green' : 'col-red');

  var container = document.getElementById('cats-container');
  container.innerHTML = '';

  for (var i = 0; i < cats.length; i++) {
    var cat   = cats[i];
    var raw   = s.spending[cat.id] || 0;
    var spent = (cat.id === 'autres') ? raw - credits : raw;
    var pct   = cat.monthly > 0 ? spent / cat.monthly : 0;
    if (pct < 0) pct = 0;
    var tpct  = cat.monthly > 0 ? Math.min(cat.target / cat.monthly, 1) : 0;
    var col   = (cat.id === 'autres' && spent < 0) ? '#1D9E75' : getColor(pct);
    var bdg   = (cat.id === 'autres' && spent < 0) ? ['En votre faveur', 'badge-ok'] : getBadge(pct);
    var left  = cat.monthly - spent;

    var msHTML = '';
    if (cat.milestones) {
      var pts = [{p:0.25,l:'Sem. 1'},{p:0.50,l:'Sem. 2'},{p:0.75,l:'Sem. 3'}];
      for (var j = 0; j < pts.length; j++) {
        msHTML += '<div class="milestone" style="left:' + (pts[j].p * 100) + '%"><span class="milestone-label">' + pts[j].l + '</span></div>';
      }
    }

    var inputHTML = '';
    if (cat.id === 'autres') {
      inputHTML =
        '<select id="sel-autres">' +
        '<option value="depense">Dépense</option>' +
        '<option value="rentree">Rentrée</option>' +
        '</select>' +
        '<input type="number" inputmode="numeric" id="inp-' + cat.id + '" placeholder="Montant €" min="1" step="1"/>';
    } else {
      inputHTML = '<input type="number" inputmode="numeric" id="inp-' + cat.id + '" placeholder="Montant €" min="1" step="1"/>';
    }

    var leftStr = (left >= 0) ? r(left) + ' €' : '−' + r(Math.abs(left)) + ' €';

    var div = document.createElement('div');
    div.className = 'cat-card';
    div.innerHTML =
      '<div class="cat-top">' +
        '<span class="cat-name">' + cat.name + '</span>' +
        '<span class="badge ' + bdg[1] + '">' + bdg[0] + '</span>' +
      '</div>' +
      '<div class="cat-amounts"><b>' + r(spent) + ' €</b> dépensés sur ' + r(cat.monthly) + ' € · reste <b>' + leftStr + '</b></div>' +
      '<div class="gauge-wrap">' +
        '<div class="gauge-track">' +
          '<div class="gauge-fill" style="width:' + Math.min(pct,1)*100 + '%;background:' + col + ';"></div>' +
          msHTML +
          '<div class="target-line" style="left:' + tpct*100 + '%;"></div>' +
        '</div>' +
      '</div>' +
      '<div class="input-row">' + inputHTML + '<button class="add-btn" onclick="addEntry(\'' + cat.id + '\')">+ Ajouter</button></div>';

    container.appendChild(div);
  }
}

render();
</script>
</body>
</html>
